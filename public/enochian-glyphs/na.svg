<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <style>
    .stroke {
      fill: none;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .fill {
      fill: currentColor;
      stroke: none;
    }
  </style>
  <!-- Na: A circle with a cross through it - circled cross or planetary symbol -->
  <circle cx="50" cy="50" r="30" class="stroke"/>
  <path d="M 50 20 L 50 80" class="stroke"/>
  <path d="M 20 50 L 80 50" class="stroke"/>
  <!-- Small tail extending down -->
  <path d="M 50 80 L 50 100" class="stroke"/>
</svg>
