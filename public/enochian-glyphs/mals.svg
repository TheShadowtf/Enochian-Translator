<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <style>
    .stroke {
      fill: none;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .fill {
      fill: currentColor;
      stroke: none;
    }
  </style>
  <!-- Mals: Like an Omega symbol - horseshoe/arch shape open at bottom with feet -->
  <path d="M 20 90 L 20 70 Q 20 20 50 20 Q 80 20 80 70 L 80 90" class="stroke"/>
  <path d="M 15 90 L 35 90" class="stroke"/>
  <path d="M 65 90 L 85 90" class="stroke"/>
</svg>
