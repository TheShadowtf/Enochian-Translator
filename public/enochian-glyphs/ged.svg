<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <style>
    .stroke {
      fill: none;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .fill {
      fill: currentColor;
      stroke: none;
    }
  </style>
  <!-- Ged: Like a reversed G/J - vertical stroke with a curved top sweeping right, plus a horizontal crossbar and dot -->
  <path d="M 60 18 Q 28 18 28 48 L 28 95" class="stroke"/>
  <path d="M 18 62 L 58 62" class="stroke"/>
  <circle cx="64" cy="18" r="4" class="fill"/>
</svg>
