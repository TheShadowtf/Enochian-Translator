<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <style>
    .stroke {
      fill: none;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .fill {
      fill: currentColor;
      stroke: none;
    }
  </style>
  <!-- Ger: Like a Y shape - two diagonal strokes meeting at a point, continuing down as a vertical stroke with a hook -->
  <path d="M 20 15 L 50 55" class="stroke"/>
  <path d="M 80 15 L 50 55" class="stroke"/>
  <path d="M 50 55 L 50 95" class="stroke"/>
</svg>
