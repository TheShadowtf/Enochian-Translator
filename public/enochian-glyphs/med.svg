<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <style>
    .stroke {
      fill: none;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .fill {
      fill: currentColor;
      stroke: none;
    }
  </style>
  <!-- Med: Like a large circle/oval with a line through it or an O with a bar -->
  <circle cx="50" cy="55" r="32" class="stroke"/>
  <!-- Horizontal bar through the middle -->
  <path d="M 18 55 L 82 55" class="stroke"/>
</svg>
