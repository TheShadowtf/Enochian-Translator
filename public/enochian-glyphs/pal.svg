<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <style>
    .stroke {
      fill: none;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .fill {
      fill: currentColor;
      stroke: none;
    }
  </style>
  <!-- Pal: Like a tall vertical bar with a right angle at bottom, like a reversed L or angular hook -->
  <path d="M 30 15 L 30 85 L 75 85" class="stroke"/>
  <!-- Small hook or serif at top -->
  <path d="M 20 15 L 40 15" class="stroke"/>
</svg>
