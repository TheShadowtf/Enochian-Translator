<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <style>
    .stroke {
      fill: none;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .fill {
      fill: currentColor;
      stroke: none;
    }
  </style>
  <!-- Van: Looks like a large U/V shape that's somewhat angular, with curved sides -->
  <path d="M 20 15 Q 20 80 50 90 Q 80 80 80 15" class="stroke"/>
  <!-- Small horizontal stroke or serif at the base -->
  <path d="M 35 55 L 65 55" class="stroke"/>
