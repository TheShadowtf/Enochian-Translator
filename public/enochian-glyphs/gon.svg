<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <style>
    .stroke {
      fill: none;
      stroke: currentColor;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .fill {
      fill: currentColor;
      stroke: none;
    }
  </style>
  <!-- Gon: Angular bracket/hook shape like a reversed J or right angle with a hook -->
  <path d="M 25 15 L 70 15 L 70 95" class="stroke"/>
  <path d="M 70 95 Q 55 95 45 80" class="stroke"/>
</svg>
